<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Inspectoor — Ethereum Spec Explorer</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface-2: #1c2128;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --text-dim: #6e7681;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
  --green: #3fb950;
  --red: #f85149;
  --orange: #d29922;
  --purple: #bc8cff;
  --pink: #f778ba;
  --cyan: #39d2c0;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  height: 100vh;
  overflow: hidden;
}
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); text-decoration: underline; }

/* Layout */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  height: 52px;
  min-height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}
.header .logo {
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
  cursor: pointer;
}
.header .logo .accent { color: var(--accent); }
.nav-tabs {
  display: flex;
  gap: 2px;
  margin-left: 8px;
}
.nav-tab {
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  background: none;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all 0.15s;
}
.nav-tab:hover { color: var(--text); background: var(--surface-2); }
.nav-tab.active { color: var(--accent); background: rgba(88,166,255,0.1); }
.search-box {
  flex: 1;
  max-width: 420px;
  position: relative;
  margin-left: auto;
}
.search-box input {
  width: 100%;
  padding: 6px 12px 6px 30px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  font-family: var(--font-mono);
  outline: none;
  transition: border-color 0.15s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box::before {
  content: '⌕';
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 15px;
  pointer-events: none;
}
.header-stats {
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
}

/* Main content area */
.main {
  flex: 1;
  overflow: hidden;
  display: flex;
}

/* Three-panel layout */
.panel-sidebar {
  width: 240px;
  min-width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0;
}
.panel-list {
  flex: 1;
  min-width: 300px;
  overflow-y: auto;
  border-right: 1px solid var(--border);
}
.panel-detail {
  flex: 2;
  overflow-y: auto;
  padding: 0;
}

/* Single-panel for overview */
.panel-full {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

/* Sidebar sections */
.sidebar-section { padding: 0 10px; margin-bottom: 14px; }
.sidebar-section h3 {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-dim);
  margin-bottom: 6px;
  padding: 0 6px;
}
.filter-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 4px 8px;
  background: none;
  border: none;
  border-radius: 4px;
  color: var(--text-muted);
  font-size: 12px;
  font-family: var(--font-sans);
  cursor: pointer;
  text-align: left;
  transition: all 0.1s;
}
.filter-btn:hover { background: var(--surface-2); color: var(--text); }
.filter-btn.active { background: rgba(88,166,255,0.1); color: var(--accent); }
.filter-btn .count {
  font-size: 10px;
  color: var(--text-dim);
  background: var(--bg);
  padding: 0 6px;
  border-radius: 10px;
  min-width: 24px;
  text-align: center;
}
.filter-btn.active .count { background: rgba(88,166,255,0.15); color: var(--accent); }

/* List items */
.list-header {
  padding: 10px 14px;
  font-size: 12px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 5;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.list-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  font-size: 13px;
}
.list-item:hover { background: var(--surface-2); }
.list-item.active { background: rgba(88,166,255,0.08); border-left: 2px solid var(--accent); }
.list-item .item-name {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.list-item .item-meta {
  display: flex;
  gap: 4px;
  align-items: center;
  flex-shrink: 0;
}

/* Badges */
.badge {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
  font-family: var(--font-mono);
  line-height: 1.6;
  white-space: nowrap;
}
.badge-class { background: rgba(188,140,255,0.15); color: var(--purple); }
.badge-def { background: rgba(63,185,80,0.15); color: var(--green); }
.badge-dataclass { background: rgba(247,120,186,0.15); color: var(--pink); }
.badge-enum { background: rgba(57,210,192,0.15); color: var(--cyan); }
.badge-constant { background: rgba(210,153,34,0.15); color: var(--orange); }
.badge-alias { background: rgba(88,166,255,0.15); color: var(--accent); }
.badge-function { background: rgba(63,185,80,0.15); color: var(--green); }

.badge-get { background: rgba(63,185,80,0.15); color: var(--green); }
.badge-post { background: rgba(88,166,255,0.15); color: var(--accent); }
.badge-put { background: rgba(210,153,34,0.15); color: var(--orange); }
.badge-delete { background: rgba(248,81,73,0.15); color: var(--red); }

/* Spec color badges */
.badge-spec {
  padding: 1px 6px;
  border-radius: 10px;
  font-size: 10px;
  font-family: var(--font-mono);
  background: var(--surface-2);
  color: var(--text-muted);
  white-space: nowrap;
}
.spec-consensus-specs { background: rgba(188,140,255,0.12); color: #c4a0ff; }
.spec-beacon-apis { background: rgba(88,166,255,0.12); color: #7ab8ff; }
.spec-execution-specs { background: rgba(63,185,80,0.12); color: #5dc96e; }
.spec-execution-apis { background: rgba(57,210,192,0.12); color: #50dece; }
.spec-builder-specs { background: rgba(247,120,186,0.12); color: #f99dcc; }
.spec-relay-specs { background: rgba(210,153,34,0.12); color: #e0b94e; }
.spec-remote-signing-api { background: rgba(248,81,73,0.12); color: #fa9e98; }

.badge-fork {
  padding: 1px 6px;
  border-radius: 10px;
  font-size: 10px;
  font-family: var(--font-mono);
  background: var(--surface-2);
  color: var(--text-dim);
}
.badge-fork.new { background: rgba(63,185,80,0.15); color: var(--green); }
.badge-fork.modified { background: rgba(210,153,34,0.15); color: var(--orange); }

/* Detail view */
.detail-content { padding: 20px 24px; max-width: 900px; }
.detail-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.detail-header h2 {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  word-break: break-all;
}
.detail-header .badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.detail-section {
  margin-bottom: 20px;
}
.detail-section h3 {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.detail-section .prose {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.7;
}

/* Tables */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.data-table th {
  text-align: left;
  padding: 6px 10px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: var(--text-dim);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.data-table td {
  padding: 5px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.data-table td:first-child {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text);
  white-space: nowrap;
}
.data-table td:nth-child(2) {
  font-family: var(--font-mono);
  font-size: 12px;
}
.data-table tr:hover { background: var(--surface-2); }

.type-link {
  color: var(--accent);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 12px;
}
.type-link:hover { color: var(--accent-hover); text-decoration: underline; }

/* Pill groups */
.pill-group { display: flex; flex-wrap: wrap; gap: 4px; }

/* Cards (specs overview) */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
  margin-top: 16px;
}
.spec-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px;
  cursor: pointer;
  transition: all 0.15s;
}
.spec-card:hover { border-color: var(--accent); background: var(--surface-2); }
.spec-card h3 {
  font-size: 15px;
  font-family: var(--font-mono);
  margin-bottom: 10px;
  color: var(--text);
}
.spec-desc {
  font-size: 12px;
  color: var(--fg-muted);
  line-height: 1.5;
  margin: 6px 0 10px 0;
}
.spec-card .stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.spec-card .stat {
  font-size: 12px;
  color: var(--text-muted);
}
.spec-card .stat strong {
  color: var(--text);
  font-size: 16px;
  display: block;
}

/* Overview stats bar */
.overview-stats {
  display: flex;
  gap: 24px;
  padding: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.overview-stat { text-align: center; }
.overview-stat .val {
  font-size: 24px;
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--accent);
}
.overview-stat .label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

/* Loading */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  flex-direction: column;
  gap: 16px;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Fork diff */
.diff-controls {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.diff-controls select {
  padding: 6px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  font-family: var(--font-mono);
  outline: none;
}
.diff-controls select:focus { border-color: var(--accent); }
.diff-group { margin-bottom: 20px; }
.diff-group h3 {
  font-size: 13px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.diff-group h3 .count-badge {
  font-size: 11px;
  padding: 1px 8px;
  border-radius: 10px;
  font-weight: 600;
}
.diff-item {
  padding: 4px 8px;
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  border-radius: 4px;
  margin-bottom: 2px;
}
.diff-item:hover { background: var(--surface-2); }
.diff-item.expanded { background: var(--surface-2); }
.diff-item-preview {
  padding: 8px 12px;
  margin: 0 0 4px 0;
  border-left: 2px solid var(--border);
  background: var(--surface-1);
  border-radius: 0 4px 4px 0;
}
.diff-item-preview .code-block {
  max-height: 400px;
  margin: 0;
  font-size: 11px;
}
.diff-item-preview .pill-group { margin-bottom: 6px; }
.diff-item-preview .diff-preview-meta {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 6px;
  font-family: var(--font-sans);
}
.diff-item-preview .diff-preview-refs {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 6px;
  font-family: var(--font-mono);
}
.diff-item-preview .diff-preview-refs a { color: var(--accent); }

/* Endpoint detail */
.method-path {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.method-path .method-badge {
  padding: 4px 12px;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 700;
  font-family: var(--font-mono);
}
.method-path .path {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 600;
  word-break: break-all;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all 0.15s;
}
.btn:hover { color: var(--text); border-color: var(--text-muted); }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  font-size: 14px;
  gap: 8px;
}
.empty-state .icon { font-size: 40px; opacity: 0.5; }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* Responsive */
@media (max-width: 900px) {
  .panel-sidebar { display: none; }
  .panel-list { flex: 1; }
  .panel-detail { display: none; }
  .main.show-detail .panel-list { display: none; }
  .main.show-detail .panel-detail { display: block; flex: 1; }
}
@media (max-width: 600px) {
  .header { gap: 6px; padding: 0 8px; }
  .nav-tabs { display: none; }
  .header-stats { display: none; }
  .search-box { max-width: 100%; }
}

/* JSON/Code blocks */
.code-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  font-family: var(--font-mono);
  font-size: 12.5px;
  line-height: 1.6;
  overflow-x: auto;
  white-space: pre;
  color: var(--fg);
  tab-size: 4;
  max-height: 600px;
  overflow-y: auto;
}
.syn-comment { color: var(--text-dim); }
.syn-keyword { color: var(--purple, #c4a0ff); }
.syn-builtin { color: var(--cyan); }
.syn-string { color: #a5d6ff; }
.syn-decorator { color: var(--orange); }
.syn-new-marker { color: var(--green); font-weight: 600; }
.syn-mod-marker { color: var(--orange); font-weight: 600; }
.syn-type { color: var(--purple, #c4a0ff); text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 2px; }
.syn-func { color: var(--green); text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 2px; }
a.type-link.syn-type:hover, a.type-link.syn-func:hover { text-decoration-style: solid; }
.github-link { color: var(--text-muted); display: flex; align-items: center; margin-left: auto; flex-shrink: 0; }
.github-link:hover { color: var(--text); text-decoration: none; }
.footer { padding: 12px 16px; text-align: center; color: var(--text-dim); font-size: 12px; border-top: 1px solid var(--border); flex-shrink: 0; }
.footer a { color: var(--text-muted); }
.footer a:hover { color: var(--text); }

/* PR tab styles */
.pr-action-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font-mono);
}
.pr-action-badge.added { background: rgba(63,185,80,0.15); color: var(--green); }
.pr-action-badge.modified { background: rgba(210,153,34,0.15); color: var(--orange); }
.pr-action-badge.removed { background: rgba(248,81,73,0.15); color: var(--red); }
.pr-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.pr-header h2 { font-size: 16px; margin-bottom: 4px; }
.pr-header .pr-meta { font-size: 13px; color: var(--text-muted); }
.pr-sidebar-item {
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.pr-sidebar-item:hover { background: var(--surface-2); }
.pr-sidebar-item.active { background: var(--surface-2); border-left: 3px solid var(--accent); }
.pr-sidebar-item .pr-num { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--accent); }
.pr-sidebar-item .pr-title { font-size: 12px; color: var(--text); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pr-sidebar-item .pr-author { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.pr-sidebar-item .pr-stats { display: flex; gap: 6px; margin-top: 4px; }
.pr-item-row {
  padding: 8px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  transition: background 0.1s;
}
.pr-item-row:hover { background: var(--surface-2); }
.pr-item-row.expanded { background: var(--surface-2); }
.pr-item-row .pr-item-name { font-family: var(--font-mono); }
.pr-item-row .pr-field-delta { font-size: 11px; color: var(--text-muted); margin-left: auto; }
.pr-item-preview {
  display: none;
  padding: 12px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.pr-item-preview .code-block { font-size: 11px; max-height: 400px; }
.field-diff-added td { background: rgba(63,185,80,0.08); }
.field-diff-removed td { background: rgba(248,81,73,0.08); }
.pr-type-notice {
  margin-bottom: 16px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
}
.pr-type-notice a { font-family: var(--font-mono); }

/* Inline diff highlighting */
.diff-code-block { position: relative; }
.diff-line-added { background: rgba(63,185,80,0.12); display: block; margin: 0 -12px; padding: 0 12px; border-left: 3px solid var(--green); }
.diff-line-removed { background: rgba(248,81,73,0.12); display: block; margin: 0 -12px; padding: 0 12px; border-left: 3px solid var(--red); }
.diff-line-changed { background: rgba(210,153,34,0.10); display: block; margin: 0 -12px; padding: 0 12px; border-left: 3px solid var(--orange); }
.diff-line-unchanged { display: block; margin: 0 -12px; padding: 0 12px; border-left: 3px solid transparent; }
.diff-word-added { background: rgba(63,185,80,0.25); border-radius: 2px; padding: 0 1px; }
.diff-word-removed { background: rgba(248,81,73,0.25); border-radius: 2px; padding: 0 1px; text-decoration: line-through; }
</style>
</head>
<body>
<div class="app" id="app">
  <header class="header">
    <div class="logo" onclick="navigate('#/')"><img src="logo.svg" alt="" style="height:20px;vertical-align:middle;margin-right:4px"> The <span class="accent">Inspectoor</span></div>
    <div class="nav-tabs" id="nav-tabs">
      <button class="nav-tab" data-route="#/" onclick="navigate('#/')">Specs</button>
      <button class="nav-tab" data-route="#/types" onclick="navigate('#/types')">Types</button>

  </header>
  <div class="main" id="main-content" style="flex:1;overflow:hidden">

  </div>
  <footer class="footer">Built by <a href="https://github.com/JasonVranek" target="_blank" rel="noopener">JasonVranek</a> · <a href="https://github.com/JasonVranek/inspectoor" target="_blank" rel="noopener">Source on GitHub</a></footer>
</div>

<script>
/* ══════════════════════════════════════════════════════════════
   GLOBALS
   ══════════════════════════════════════════════════════════════ */
let catalog = null;

// Canonical fork display order (CL and EL unified). Used for sorting fork tabs.
const CL_FORK_ORDER = ['phase0','altair','bellatrix','capella','deneb','electra','fulu','gloas','heze'];
const EL_FORK_ORDER = ['frontier','homestead','byzantium','constantinople','istanbul','berlin','london','paris','shanghai','cancun','prague','osaka','amsterdam'];
const ALL_FORK_ORDER = [...CL_FORK_ORDER, ...EL_FORK_ORDER];

// Forks to hide from the UI (internal names, not real network forks)
const HIDDEN_FORKS = new Set([
  'dao_fork','tangerine_whistle','spurious_dragon','muir_glacier',
  'arrow_glacier','gray_glacier','bpo1','bpo2','bpo3','bpo4','bpo5','unversioned'
]);

// Sort fork names by canonical order (no filtering) -- for internal carry-forward
function sortForksRaw(forkNames) {
  return [...forkNames].sort((a, b) => {
    const ai = ALL_FORK_ORDER.indexOf(a);
    const bi = ALL_FORK_ORDER.indexOf(b);
    if (ai === -1 && bi === -1) return a.localeCompare(b);
    if (ai === -1) return 1;
    if (bi === -1) return 1;
    return ai - bi;
  });
}

// Sort fork names by canonical order, filter hidden -- for display
function sortForks(forkNames) {
  return sortForksRaw(forkNames).filter(f => !HIDDEN_FORKS.has(f));
}

let allItems = [];
let allEndpoints = [];
let searchQuery = '';

// Persistent filter state (survives item selection)
let typeFilters = { spec: '', kind: '', domain: '' };
let epFilters = { spec: '', method: '', domain: '', group: '' };

const SPEC_COLORS = {
  'consensus-specs': 'spec-consensus-specs',
  'beacon-apis': 'spec-beacon-apis',
  'execution-specs': 'spec-execution-specs',
  'execution-apis': 'spec-execution-apis',
  'builder-specs': 'spec-builder-specs',
  'relay-specs': 'spec-relay-specs',
  'remote-signing-api': 'spec-remote-signing-api'
};

const KIND_BADGES = {
  'class': 'badge-class',
  'def': 'badge-def',
  'function': 'badge-function',
  'dataclass': 'badge-dataclass',
  'enum': 'badge-enum',
  'constant': 'badge-constant',
  'alias': 'badge-alias'
};

const METHOD_BADGES = {
  'GET': 'badge-get',
  'POST': 'badge-post',
  'PUT': 'badge-put',
  'DELETE': 'badge-delete'
};

/* ══════════════════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════════════════ */
async function init() {
  try {
    const resp = await fetch('catalog.json');
    catalog = await resp.json();
    buildIndexes();
    updateHeaderStats();
    window.addEventListener('hashchange', route);
    route();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      '<div style="color:var(--red)">Failed to load catalog.json</div><div style="color:var(--text-dim);font-size:12px">'+e.message+'</div>';
  }
}

function buildIndexes() {
  allItems = [];
  allEndpoints = [];
  // Items are unified at catalog.items (deduped across specs)
  for (const [name, item] of Object.entries(catalog.items)) {
    allItems.push({ ...item, _type: 'item' });
  }
  // Endpoints and constants are still per-spec
  for (const [specName, spec] of Object.entries(catalog.specs)) {
    if (spec.endpoints) {
      for (const [name, ep] of Object.entries(spec.endpoints)) {
        allEndpoints.push({ ...ep, _spec: specName, _key: name, _type: 'endpoint' });
      }
    }
    if (spec.constants) {
      for (const [name, c] of Object.entries(spec.constants)) {
      }
    }
  }
}

function updateHeaderStats() {
  const totalItems = Object.keys(catalog.items).length;
  let totalEps = 0;
  for (const s of Object.values(catalog._meta.specs)) { totalEps += s.endpoints; }
  document.getElementById('header-stats').textContent =
    totalItems + ' types · ' + totalEps + ' endpoints · ' + Object.keys(catalog._meta.specs).length + ' specs';
}

/* ══════════════════════════════════════════════════════════════
   ROUTING
   ══════════════════════════════════════════════════════════════ */
function navigate(hash) {
  window.location.hash = hash;
}

function route() {
  const hash = window.location.hash || '#/';
  const main = document.getElementById('main-content');
  const hasDetail = hash.startsWith('#/type/') || hash.startsWith('#/endpoint/');
  main.className = 'main' + (hasDetail ? ' show-detail' : '');

  // Update nav tabs
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  if (hash === '#/' || hash === '#/specs' || hash === '') {
    document.querySelector('[data-route="#/"]').classList.add('active');
  } else if (hash.startsWith('#/type') || hash.startsWith('#/types')) {
    document.querySelector('[data-route="#/types"]').classList.add('active');
  } else if (hash.startsWith('#/endpoint') || hash.startsWith('#/endpoints')) {
    document.querySelector('[data-route="#/endpoints"]').classList.add('active');
  } else if (hash.startsWith('#/diff')) {
    document.querySelector('[data-route="#/diff"]').classList.add('active');
  } else if (hash.startsWith('#/prs')) {
    document.querySelector('[data-route="#/prs"]').classList.add('active');
  }

  // Parse route
  if (hash === '#/' || hash === '#/specs' || hash === '') {
    renderSpecsOverview(main);
  } else if (hash.startsWith('#/type/')) {
    // Type detail: render within the type browser
    const name = decodeURIComponent(hash.replace('#/type/', '').split('?')[0]);
    renderTypeBrowser(main, parseParams(hash), { name });
  } else if (hash.startsWith('#/types')) {
    renderTypeBrowser(main, parseParams(hash), null);
  } else if (hash.startsWith('#/endpoint/')) {
    // Endpoint detail: render within the endpoint browser
    const parts = hash.replace('#/endpoint/', '').split('/');
    const spec = decodeURIComponent(parts[0]);
    const name = decodeURIComponent(parts.slice(1).join('/'));
    renderEndpointBrowser(main, parseParams(hash), { spec, name });
  } else if (hash.startsWith('#/endpoints')) {
    renderEndpointBrowser(main, parseParams(hash), null);
  } else if (hash.startsWith('#/diff')) {
    renderDiffView(main, parseParams(hash));
  } else if (hash.startsWith('#/prs')) {
    renderPRBrowser(main, parseParams(hash));
  } else {
    renderSpecsOverview(main);
  }
}

function parseParams(hash) {
  const q = hash.indexOf('?');
  if (q < 0) return {};
  const params = {};
  hash.substring(q+1).split('&').forEach(p => {
    const [k,v] = p.split('=');
    if (k && v) params[decodeURIComponent(k)] = decodeURIComponent(v);
  });
  return params;
}

/* ══════════════════════════════════════════════════════════════
   FUZZY SEARCH (ported from beacon-specs-explorer)
   ══════════════════════════════════════════════════════════════ */

// Subsequence fuzzy scoring with memoization.
// Returns a numeric score (higher = better match) or null (no match).
// Exact substring gets highest score. Otherwise scores based on:
// consecutive char runs, word boundary matches, early position, gap penalty.
function fuzzyScore(target, query) {
  if (!query) return 0;
  const tLow = target.toLowerCase();
  const qLow = query.toLowerCase();
  // Exact substring: highest possible score
  if (tLow.includes(qLow)) {
    const pos = tLow.indexOf(qLow);
    return 10000 - pos * 10 - tLow.length;
  }
  // Recursive best-match with memoization
  const memo = {};
  function solve(ti, qi, consecutive) {
    if (qi === qLow.length) return 0;
    if (ti >= tLow.length) return null;
    const key = ti + ',' + qi + ',' + consecutive;
    if (key in memo) return memo[key];
    let best = null;
    for (let i = ti; i < tLow.length; i++) {
      if (tLow[i] !== qLow[qi]) continue;
      let s = 1;
      const isConsec = (i === ti && consecutive > 0);
      const newConsec = isConsec ? consecutive + 1 : (qi === 0 ? 1 : 0);
      if (isConsec) s += newConsec * 6;
      if (i === 0 || tLow[i - 1] === '_' || tLow[i - 1] === '-' ||
          (target[i] >= 'A' && target[i] <= 'Z' && target[i-1] >= 'a' && target[i-1] <= 'z'))
        s += 5; // word boundary
      s += Math.max(0, 10 - i);
      const rest = solve(i + 1, qi + 1, newConsec);
      if (rest === null) continue;
      const total = s + rest - (i - ti) * 0.5;
      if (best === null || total > best) best = total;
    }
    memo[key] = best;
    return best;
  }
  const base = solve(0, 0, 0);
  if (base === null) return null;
  return base - tLow.length * 0.6;
}

// Wrap matched chars in <mark> for visual feedback
function fuzzyHighlight(text, query) {
  if (!query) return esc(text);
  const lower = text.toLowerCase();
  const qLow = query.toLowerCase();
  let qi = 0, out = '';
  for (let i = 0; i < text.length; i++) {
    if (qi < qLow.length && lower[i] === qLow[qi]) {
      out += '<mark style="background:rgba(88,166,255,0.25);color:inherit;padding:0;border-radius:1px">' + esc(text[i]) + '</mark>';
      qi++;
    } else {
      out += esc(text[i]);
    }
  }
  return out;
}

// Backward compat wrapper -- returns true/false
function onSearchInput(val) {
  searchQuery = val;
  const hash = window.location.hash || '#/';
  if (hash.startsWith('#/diff')) {
    filterDiffItems(val);
  } else if (hash.startsWith('#/types') || hash.startsWith('#/endpoints')) {
    route();
  } else if (val.length > 0) {
    navigate('#/types');
  }
}

function filterDiffItems(query) {
  document.querySelectorAll('.diff-group').forEach(group => {
    const items = group.querySelectorAll('.diff-item');
    let anyVisible = false;
    items.forEach(item => {
      const preview = item.nextElementSibling;
      // Extract just the type/function name (strip the +/~ prefix)
      const name = item.textContent.trim().replace(/^[+~]\s*/, '');
      const match = !query || fuzzyScore(name, query) !== null;
      item.style.display = match ? '' : 'none';
      if (preview && preview.classList.contains('diff-item-preview')) {
        if (!match) preview.style.display = 'none';
      }
      if (match) anyVisible = true;
    });
    group.style.display = anyVisible ? '' : 'none';
  });
}

/* ══════════════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
   ══════════════════════════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
  const searchInput = document.getElementById('search-input');
  const isTyping = document.activeElement === searchInput;

  // / to focus search (vim-style)
  if (e.key === '/' && !isTyping) {
    e.preventDefault();
    searchInput.focus();
    return;
  }

  // Escape: cycle through blur -> clear -> back
  if (e.key === 'Escape') {
    if (isTyping) {
      searchInput.blur();
    } else if (searchQuery) {
      searchQuery = '';
      searchInput.value = '';
      if ((window.location.hash || '').startsWith('#/diff')) {
        filterDiffItems('');
      } else {
        route();
      }
    } else {
      history.back();
    }
    return;
  }

  // Don't intercept arrows/j/k/h while typing in search
  if (isTyping) return;

  // j/k or Arrow Down/Up: navigate through list items
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp' || e.key === 'j' || e.key === 'k') {
    e.preventDefault();
    const rows = document.querySelectorAll('.list-item');
    if (rows.length === 0) return;

    let currentIdx = -1;
    rows.forEach((row, i) => {
      if (row.classList.contains('active')) currentIdx = i;
    });

    let nextIdx;
    if (e.key === 'ArrowDown' || e.key === 'j') {
      nextIdx = currentIdx < rows.length - 1 ? currentIdx + 1 : 0;
    } else {
      nextIdx = currentIdx > 0 ? currentIdx - 1 : rows.length - 1;
    }

    // Click the row to navigate
    rows[nextIdx].click();
    rows[nextIdx].scrollIntoView({ block: 'nearest' });
    return;
  }

  // Enter on a selected list item: navigate to detail
  if (e.key === 'Enter') {
    const active = document.querySelector('.list-item.active');
    if (active) active.click();
    return;
  }

  // h or ArrowLeft: go back
  if (e.key === 'h' || e.key === 'ArrowLeft') {
    // Only go back if we're in a detail view
    const hash = window.location.hash || '';
    if (hash.startsWith('#/type/') || hash.startsWith('#/endpoint/')) {
      history.back();
    }
    return;
  }
});

/* ══════════════════════════════════════════════════════════════
   HELPERS
   ══════════════════════════════════════════════════════════════ */
function copyCurl(btn) {
  const pre = btn.closest('.detail-section').querySelector('pre');
  const text = pre.textContent;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.style.color = 'var(--green)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
  });
}

function switchForkTab(tabId, fork, btn) {
  // Hide all code blocks for this tab group, update source link
  let githubUrl = '';
  document.querySelectorAll('.fork-code-block[data-tabs="' + tabId + '"]').forEach(el => {
    const show = el.dataset.fork === fork;
    el.style.display = show ? '' : 'none';
    if (show && el.dataset.githubUrl) githubUrl = el.dataset.githubUrl;
  });
  // Update View Source button
  const sourceBtn = document.getElementById('source-btn');
  if (sourceBtn && githubUrl) {
    sourceBtn.href = githubUrl;
  }
  // Update button styles
  const parent = btn.parentElement;
  parent.querySelectorAll('.badge-fork').forEach(b => {
    b.style.borderColor = '';
    b.style.color = '';
  });
  btn.style.borderColor = 'var(--accent)';
  btn.style.color = 'var(--accent)';
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function kindBadge(kind) {
  const cls = KIND_BADGES[kind] || 'badge-class';
  return '<span class="badge ' + cls + '">' + esc(kind) + '</span>';
}

function specBadge(spec) {
  const cls = SPEC_COLORS[spec] || '';
  return '<span class="badge-spec ' + cls + '">' + esc(spec) + '</span>';
}

function methodBadge(method) {
  const cls = METHOD_BADGES[method] || 'badge-get';
  return '<span class="badge ' + cls + '">' + esc(method) + '</span>';
}

function forkBadge(fork, cls) {
  return '<span class="badge-fork ' + (cls||'') + '">' + esc(fork) + '</span>';
}

function resolveTypeSpec(typeName) {
  // Items are unified -- just check catalog.items
  const item = catalog.items && catalog.items[typeName];
  return item ? item.spec : null;
}

function typeLink(typeName, contextSpec) {
  if (!typeName) return '';
  // Clean type name - strip List[], Optional[], etc.
  const clean = typeName.replace(/^(List|Optional|Sequence|Vector|ByteList|ByteVector|Bitlist|Bitvector)\[/, '').replace(/\]$/, '').replace(/,.*/, '').trim();
  const spec = resolveTypeSpec(clean);
  if (spec) {
    return '<a class="type-link" href="#/type/' + encodeURIComponent(clean) + '">' + esc(typeName) + '</a>';
  }
  return '<span style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted)">' + esc(typeName) + '</span>';
}

function githubBtn(url, id) {
  if (!url) return '';
  return '<a class="btn" ' + (id ? 'id="' + id + '" ' : '') + 'href="' + esc(url) + '" target="_blank" rel="noopener">↗ View Source</a>';
}

/* ══════════════════════════════════════════════════════════════
   VIEW 1: SPECS OVERVIEW
   ══════════════════════════════════════════════════════════════ */
function renderSpecsOverview(container) {
  const meta = catalog._meta;
  let totalItems = 0, totalEps = 0, totalConst = 0, totalAliases = 0;
  for (const [k,v] of Object.entries(meta.specs)) {
    totalItems += v.items;
    totalEps += v.endpoints;
    totalConst += v.constants;
    totalAliases += v.type_aliases;
  }

  let html = '<div class="panel-full">';
  html += '<h1 style="font-size:24px;margin-bottom:16px;font-family:var(--font-mono)"><img src="logo.svg" alt="" style="height:28px;vertical-align:middle;margin-right:6px"> The <span style="color:var(--accent)">Inspectoor</span></h1>';
  html += '<p style="color:var(--text-muted);margin-bottom:20px;font-size:14px">Explore all Ethereum specification types, endpoints, constants, and forks across every spec repo.</p>';

  // Stats bar
  html += '<div class="overview-stats">';
  html += '<div class="overview-stat"><div class="val">' + Object.keys(meta.specs).length + '</div><div class="label">Specs</div></div>';
  html += '<div class="overview-stat"><div class="val">' + totalItems + '</div><div class="label">Types</div></div>';
  html += '<div class="overview-stat"><div class="val">' + totalEps + '</div><div class="label">Endpoints</div></div>';
  html += '<div class="overview-stat"><div class="val">' + totalConst + '</div><div class="label">Constants</div></div>';
  html += '<div class="overview-stat"><div class="val">' + totalAliases + '</div><div class="label">Type Aliases</div></div>';
  html += '</div>';


  const SPEC_DESC = {
    'consensus-specs': 'The core protocol: fork choice, state transitions, validator duties, and the beacon chain mechanics that keep Ethereum in consensus.',
    'execution-specs': 'Execution layer logic: EVM opcodes, state trie, transaction processing, and the rules that turn transactions into state changes.',
    'execution-apis': 'JSON-RPC for wallets and nodes, plus the Engine API that drives block building between consensus and execution clients.',
    'beacon-apis': 'The REST API exposed by beacon nodes. Used by validators, tooling, and the consensus client itself to query chain state and submit duties.',
    'builder-specs': 'The proposer-builder separation API. Defines how validators request execution payload headers from builders via a sidecar like mev-boost.',
    'relay-specs': 'The relay API that sits between builders and proposers. Handles block submission, bid delivery, and payload revelation.',
    'remote-signing-api': 'The API for delegating validator signing to a remote signer (Web3Signer, Dirk). Keeps keys off the beacon node.'
  };

  // Cards
  html += '<div class="cards-grid">';
  for (const [specName, specData] of Object.entries(catalog.specs)) {
    const m = specData.meta || {};
    const sm = catalog._meta.specs[specName] || {};
    const forkCount = sortForks(m.fork_order || []).length;
    html += '<div class="spec-card" onclick="navigate(\'#/types?spec=' + encodeURIComponent(specName) + '\')">';
    html += '<h3>' + specBadge(specName) + ' ' + esc(specName) + '</h3>';
    if (SPEC_DESC[specName]) html += '<p class="spec-desc">' + SPEC_DESC[specName] + '</p>';
    html += '<div class="stats">';
    html += '<div class="stat"><strong>' + (sm.items || 0) + '</strong>Types</div>';
    html += '<div class="stat"><strong>' + (sm.endpoints || 0) + '</strong>Endpoints</div>';
    html += '<div class="stat"><strong>' + (sm.constants || 0) + '</strong>Constants</div>';
    html += '<div class="stat"><strong>' + forkCount + '</strong>Forks</div>';
    html += '</div>';
    if (m.fork_order && m.fork_order.length) {
      html += '<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:3px">';
      sortForks(m.fork_order || []).forEach(f => { html += forkBadge(f); });
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div></div>';
  container.innerHTML = html;
}

/* ══════════════════════════════════════════════════════════════
   VIEW 2: TYPE BROWSER
   ══════════════════════════════════════════════════════════════ */
function setTypeFilter(key, value) {
  typeFilters[key] = value;
  // Re-render in place (keep current selection if any)
  route();
}

function renderTypeBrowser(container, params, selected) {
  // Apply URL params to filters only when first entering types view (not from detail nav)
  if (params.spec !== undefined && !selected) {
    if (params.spec) typeFilters.spec = params.spec;
    if (params.kind) typeFilters.kind = params.kind;
    if (params.domain) typeFilters.domain = params.domain;
  }

  const { spec: filterSpec, kind: filterKind, domain: filterDomain } = typeFilters;

  // Collect filter facets
  const specs = {}, kinds = {}, domains = {};
  allItems.forEach(item => {
    // Count in each spec this item belongs to
    if (item.specs) item.specs.forEach(s => { specs[s] = (specs[s]||0) + 1; });
    if (item.kind) kinds[item.kind] = (kinds[item.kind]||0) + 1;
    if (item.domain) domains[item.domain] = (domains[item.domain]||0) + 1;
  });

  // Filter
  let filtered = allItems.filter(item => {
    if (filterSpec && (!item.specs || !item.specs.includes(filterSpec))) return false;
    if (filterKind && item.kind !== filterKind) return false;
    if (filterDomain && item.domain !== filterDomain) return false;
    if (searchQuery && fuzzyScore(item.name, searchQuery) === null) return false;
    return true;
  });

  if (searchQuery) {
    filtered.sort((a, b) => fuzzyScore(b.name, searchQuery) - fuzzyScore(a.name, searchQuery));
  } else {
    filtered.sort((a,b) => a.name.localeCompare(b.name));
  }

  // Sidebar
  let sideHtml = '';
  sideHtml += '<div class="sidebar-section"><h3>Specs</h3>';
  sideHtml += typeFilterBtn('spec', '', 'All specs', allItems.length, filterSpec === '');
  for (const [s, c] of Object.entries(specs).sort((a,b)=>b[1]-a[1])) {
    sideHtml += typeFilterBtn('spec', s, s, c, filterSpec === s);
  }
  sideHtml += '</div>';
  sideHtml += '<div class="sidebar-section"><h3>Kind</h3>';
  sideHtml += typeFilterBtn('kind', '', 'All kinds', '', filterKind === '');
  for (const [k, c] of Object.entries(kinds).sort((a,b)=>b[1]-a[1])) {
    sideHtml += typeFilterBtn('kind', k, k, c, filterKind === k);
  }
  sideHtml += '</div>';
  sideHtml += '<div class="sidebar-section"><h3>Domain</h3>';
  sideHtml += typeFilterBtn('domain', '', 'All domains', '', filterDomain === '');
  for (const [d, c] of Object.entries(domains).sort((a,b)=>b[1]-a[1])) {
    sideHtml += typeFilterBtn('domain', d, d, c, filterDomain === d);
  }
  sideHtml += '</div>';

  // List
  const selName = selected ? selected.name : null;
  let listHtml = '<div class="list-header"><span>' + filtered.length + ' types</span></div>';
  const renderCount = Math.min(filtered.length, 500);
  for (let i = 0; i < renderCount; i++) {
    const item = filtered[i];
    const isActive = (item.name === selName);
    listHtml += '<div class="list-item' + (isActive ? ' active' : '') + '" onclick="navigate(\'#/type/' +
      encodeURIComponent(item.name) + '\')">' +
      '<span class="item-name">' + (searchQuery ? fuzzyHighlight(item.name, searchQuery) : esc(item.name)) + '</span>' +
      '<span class="item-meta">' + kindBadge(item.kind) + specBadge(item.spec) +
      (item.specs && item.specs.length > 1 ? '<span style="font-size:9px;color:var(--text-dim)">+' + (item.specs.length-1) + '</span>' : '') +
      '</span></div>';
  }
  if (filtered.length > renderCount) {
    listHtml += '<div style="padding:12px;color:var(--text-dim);font-size:12px;text-align:center">… and ' + (filtered.length - renderCount) + ' more. Use search to narrow.</div>';
  }

  // Detail
  let detailHtml = selected
    ? renderTypeDetailContent(null, selected.name)
    : '<div class="empty-state"><div class="icon">📋</div><div>Select a type to view details</div></div>';

  container.innerHTML =
    '<div class="panel-sidebar">' + sideHtml + '</div>' +
    '<div class="panel-list">' + listHtml + '</div>' +
    '<div class="panel-detail">' + detailHtml + '</div>';

  if (selected) {
    const activeRow = container.querySelector('.list-item.active');
    if (activeRow) activeRow.scrollIntoView({ block: 'nearest' });
  }
}

function typeFilterBtn(key, value, label, count, active) {
  return '<button class="filter-btn' + (active ? ' active' : '') + '" onclick="setTypeFilter(\'' + key + '\', \'' + esc(value) + '\')">' +
    '<span>' + esc(label) + '</span>' +
    (count ? '<span class="count">' + count + '</span>' : '') +
    '</button>';
}



/* ══════════════════════════════════════════════════════════════
   VIEW 3: TYPE DETAIL
   ══════════════════════════════════════════════════════════════ */
function getCodeForFork(item, fork) {
  // PR fork resolution: if fork looks like 'pr-NNNN', check overlays
  if (typeof fork === 'string' && fork.startsWith('pr-')) {
    const prNum = fork.slice(3);
    const overlays = catalog.pr_overlays || {};
    for (const spec in overlays) {
      const ov = overlays[spec][prNum];
      if (ov && ov.items_changed && ov.items_changed[item.name] && ov.items_changed[item.name].code) {
        return ov.items_changed[item.name].code;
      }
    }
    return '';
  }
  // Walk backward from this fork to find the last fork with code (carry-forward)
  // Use sortForksRaw so we can reach code in hidden forks (e.g. spurious_dragon)
  const forks = sortForksRaw(Object.keys(item.forks));
  const idx = forks.indexOf(fork);
  for (let i = idx; i >= 0; i--) {
    if (item.forks[forks[i]] && item.forks[forks[i]].code) return item.forks[forks[i]].code;
  }
  return '';
}


// Line-level diff for side-by-side code comparison
function computeLineDiff(oldLines, newLines) {
  const m = oldLines.length, n = newLines.length;
  // Build LCS table
  const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      if (oldLines[i-1].trim() === newLines[j-1].trim()) dp[i][j] = dp[i-1][j-1] + 1;
      else dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
    }
  }
  // Extract LCS matches (old->new index pairs)
  const matches = [];
  let i = m, j = n;
  while (i > 0 && j > 0) {
    if (oldLines[i-1].trim() === newLines[j-1].trim()) {
      matches.unshift([i-1, j-1]); i--; j--;
    } else if (dp[i-1][j] >= dp[i][j-1]) { i--; }
    else { j--; }
  }
  // Build ops from LCS matches + gaps between them
  const ops = [];
  let oi = 0, ni = 0;
  function processGap(oldEnd, newEnd) {
    const og = [], ng = [];
    while (oi < oldEnd) og.push(oi++);
    while (ni < newEnd) ng.push(ni++);
    const paired = Math.min(og.length, ng.length);
    for (let k = 0; k < paired; k++) ops.push({ type: 'change', oldIdx: og[k], newIdx: ng[k] });
    for (let k = paired; k < og.length; k++) ops.push({ type: 'remove', oldIdx: og[k] });
    for (let k = paired; k < ng.length; k++) ops.push({ type: 'add', newIdx: ng[k] });
  }
  for (const [mi, mj] of matches) {
    processGap(mi, mj);
    ops.push({ type: 'equal', oldIdx: mi, newIdx: mj });
    oi = mi + 1; ni = mj + 1;
  }
  processGap(m, n);
  return ops;
}

// Render side-by-side code with inline diff highlighting
function renderDiffCodeBlocks(oldCode, newCode, oldLabel, newLabel) {
  const oldLines = oldCode.split('\n');
  const newLines = newCode.split('\n');
  const ops = computeLineDiff(oldLines, newLines);

  let leftHtml = '', rightHtml = '';
  ops.forEach(op => {
    if (op.type === 'equal') {
      const hl = highlightPython(oldLines[op.oldIdx]);
      leftHtml += '<span class="diff-line-unchanged">' + hl + '\n</span>';
      rightHtml += '<span class="diff-line-unchanged">' + highlightPython(newLines[op.newIdx]) + '\n</span>';
    } else if (op.type === 'remove') {
      leftHtml += '<span class="diff-line-removed">' + highlightPython(oldLines[op.oldIdx]) + '\n</span>';
      rightHtml += '<span class="diff-line-unchanged" style="opacity:0.3">\n</span>';
    } else if (op.type === 'add') {
      leftHtml += '<span class="diff-line-unchanged" style="opacity:0.3">\n</span>';
      rightHtml += '<span class="diff-line-added">' + highlightPython(newLines[op.newIdx]) + '\n</span>';
    } else if (op.type === 'change') {
      leftHtml += '<span class="diff-line-removed">' + highlightPython(oldLines[op.oldIdx]) + '\n</span>';
      rightHtml += '<span class="diff-line-added">' + highlightPython(newLines[op.newIdx]) + '\n</span>';
    }
  });

  let html = '<div style="display:flex;gap:8px;flex-wrap:wrap">';
  html += '<div style="flex:1;min-width:280px"><div style="font-size:10px;color:var(--text-dim);margin-bottom:4px">' + oldLabel + '</div>';
  html += '<pre class="code-block diff-code-block" style="max-height:400px;font-size:11px">' + leftHtml + '</pre></div>';
  html += '<div style="flex:1;min-width:280px"><div style="font-size:10px;color:var(--green);margin-bottom:4px">' + newLabel + '</div>';
  html += '<pre class="code-block diff-code-block" style="max-height:400px;font-size:11px">' + rightHtml + '</pre></div>';
  html += '</div>';
  return html;
}

function highlightPython(code) {
  if (!code) return '';
  const KW = /\b(class|def|return|if|else|elif|for|while|in|not|and|or|is|assert|raise|import|from|as|with|yield|pass|break|continue|try|except|finally|True|False|None|lambda)\b/g;
  const BUILTIN = /\b(uint64|uint8|uint16|uint32|uint128|uint256|Bytes|Bytes1|Bytes4|Bytes8|Bytes20|Bytes32|Bytes48|Bytes96|Bytes256|byte|bool|int|str|list|dict|tuple|set|List|Vector|Bitlist|Bitvector|ByteList|ByteVector|Container|StableContainer|Profile|Union|GeneralizedIndex|Optional)\b/g;
  return code.split('\n').map(line => {
    let escaped = line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    // Find comment start (not inside a string)
    let inStr = null, commentIdx = -1;
    for (let i = 0; i < escaped.length; i++) {
      const ch = escaped[i];
      if (inStr) { if (ch === '\\') { i++; continue; } if (ch === inStr) inStr = null; }
      else { if (ch === '"' || ch === "'") inStr = ch; else if (ch === '#') { commentIdx = i; break; } }
    }
    let codePart, commentPart;
    if (commentIdx >= 0) {
      codePart = escaped.slice(0, commentIdx);
      const rawComment = escaped.slice(commentIdx);
      commentPart = '<span class="syn-comment">' +
        rawComment
          .replace(/(\[New in [^\]]+\])/g, '<span class="syn-new-marker">$1</span>')
          .replace(/(\[Modified in [^\]]+\])/g, '<span class="syn-mod-marker">$1</span>') +
        '</span>';
    } else {
      codePart = escaped;
      commentPart = '';
    }
    function linkifyCode(seg) {
      let result = seg.replace(KW, '<span class="syn-keyword">$1</span>');
      result = result.replace(BUILTIN, '<span class="syn-builtin">$1</span>');
      // Linkify known types and identifiers
      if (catalog) {
        const parts = result.split(/(<span[^>]*>.*?<\/span>|<a[^>]*>.*?<\/a>)/g);
        result = parts.map(part => {
          if (part.startsWith('<span') || part.startsWith('<a')) return part;
          return part.replace(/\b([A-Za-z_][A-Za-z0-9_]*)\b/g, (match) => {
            const it = catalog.items[match];
            if (it) {
              const kind = it.kind;
              const cls = (kind === 'class' || kind === 'dataclass') ? 'syn-type' : 'syn-func';
              return '<a class="type-link ' + cls + '" href="#/type/' + encodeURIComponent(match) + '">' + match + '</a>';
            }
            const s = resolveTypeSpec(match);
            if (s) return '<a class="type-link syn-type" href="#/type/' + encodeURIComponent(match) + '">' + match + '</a>';
            return match;
          });
        }).join('');
      }
      return result;
    }
    // Handle strings
    const strRe = /"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'/g;
    let processed = '', lastIdx = 0, m;
    while ((m = strRe.exec(codePart)) !== null) {
      processed += linkifyCode(codePart.slice(lastIdx, m.index));
      processed += '<span class="syn-string">' + m[0] + '</span>';
      lastIdx = m.index + m[0].length;
    }
    processed += linkifyCode(codePart.slice(lastIdx));
    // Decorators
    processed = processed.replace(/^(\s*)(@\w+)/, '$1<span class="syn-decorator">$2</span>');
    return processed + commentPart;
  }).join('\n');
}

function renderTypeDetailContent(selectedSpec, name) {
  // Items are unified in catalog.items (already merged across specs)
  const item = catalog.items[name];
  if (!item) {
    return '<div class="empty-state"><div class="icon">❓</div><div>Type not found: ' + esc(name) + '</div></div>';
  }
  const spec = item.spec;
  const forkNames = Object.keys(item.forks);
  const latestFork = forkNames[forkNames.length - 1];

  let html = '<div class="detail-content">';

  // Header
  html += '<div class="detail-header">';
  html += '<h2>' + esc(item.name) + '</h2>';
  html += '<div class="badges">';
  html += kindBadge(item.kind);
  // Show all specs this type appears in
  if (item.specs) item.specs.forEach(s => { html += specBadge(s); });
  if (item.domain) html += '<span class="badge-spec">' + esc(item.domain) + '</span>';
  if (item.introduced) html += forkBadge(item.introduced, 'new');
  html += '</div></div>';

  // PRs affecting this type
  const affectingPRs = findPRsForType(name);
  if (affectingPRs.length) {
    html += '<div class="pr-type-notice">';
    html += '<div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">PRs affecting this type:</div>';
    affectingPRs.forEach(pr => {
      const actionColor = pr.action === 'added' ? 'var(--green)' : pr.action === 'removed' ? 'var(--red)' : 'var(--orange)';
      html += '<div style="margin-top:2px">';
      html += '<a href="#/prs?pr=' + pr.number + '&item=' + encodeURIComponent(name) + '" style="color:var(--accent)">';
      html += 'PR #' + pr.number + ': ' + esc(pr.title);
      html += '</a>';
      html += ' <span style="color:' + actionColor + ';font-size:11px">(' + esc(pr.summary) + ')</span>';
      html += '</div>';
    });
    html += '</div>';
  }

  // GitHub + EIPs row
  const latestData = item.forks[latestFork] || {};
  html += '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">';
  html += githubBtn(latestData.github_url, 'source-btn');
  if (latestData.eips && latestData.eips.length) {
    latestData.eips.forEach(eip => {
      const num = String(eip).replace(/^eip-?/i, '');
      html += '<a href="https://eips.ethereum.org/EIPS/eip-' + num + '" target="_blank" rel="noopener" class="badge" style="background:rgba(88,166,255,0.1);color:var(--accent)">EIP-' + esc(num) + '</a>';
    });
  }
  html += '</div>';

  // Fork code tabs (shown first -- the main content) -- use item (may be from a different spec if this spec has no code)
  // Build fork tab list: only show forks where something actually changed
  function fieldsSignature(fields) {
    if (!fields || !fields.length) return '';
    return fields.map(f => f.name + ':' + f.type).join('|');
  }
  function hasDiff(item, fork, allSorted) {
    const fd = item.forks[fork];
    if (!fd) return false;
    if (fd.code || fd.is_new || fd.is_modified) return true;
    // If this fork only has fields, check if they differ from the previous fork
    if (fd.fields && fd.fields.length) {
      const idx = allSorted.indexOf(fork);
      if (idx <= 0) return true; // first fork with fields = always show
      // Walk backward to find previous fork with fields
      for (let i = idx - 1; i >= 0; i--) {
        const prev = item.forks[allSorted[i]];
        if (prev && prev.fields && prev.fields.length) {
          return fieldsSignature(fd.fields) !== fieldsSignature(prev.fields);
        }
      }
      return true; // no previous fork with fields found
    }
    return false;
  }
  const allSortedRaw = sortForksRaw(Object.keys(item.forks));
  let codeForkNames = sortForks(Object.keys(item.forks)).filter(f => hasDiff(item, f, allSortedRaw));
  // If all forks were filtered out, fall back to unfiltered (e.g. types only in 'unversioned')
  if (codeForkNames.length === 0) {
    codeForkNames = allSortedRaw.filter(f => hasDiff(item, f, allSortedRaw));
  }
  // Last resort: show the last fork that has any content at all
  if (codeForkNames.length === 0) {
    const lastWithContent = allSortedRaw.filter(f => {
      const fd = item.forks[f];
      return fd && (fd.code || fd.fields || fd.is_new);
    });
    if (lastWithContent.length) codeForkNames = [lastWithContent[lastWithContent.length - 1]];
  }
  const hasCode = codeForkNames.some(f => getCodeForFork(item, f));

  if (hasCode && codeForkNames.length > 0) {
    const tabId = 'fork-tabs-' + name.replace(/[^a-zA-Z0-9]/g, '_');
    html += '<div class="detail-section"><h3>Definition' +
      '' +
      '</h3>';

    // Fork tab pills
    html += '<div class="pill-group" style="margin-bottom:8px">';
    codeForkNames.forEach((f, i) => {
      let cls = '';
      const fd = item.forks[f];
      if (fd.is_new) cls = 'new';
      else if (fd.is_modified) cls = 'modified';
      const isLast = i === codeForkNames.length - 1;
      html += '<button class="badge-fork ' + cls + '" style="cursor:pointer;' + (isLast ? 'border-color:var(--accent);color:var(--accent)' : '') + '" onclick="switchForkTab(\'' + esc(tabId) + '\', \'' + esc(f) + '\', this)">' + esc(f) + '</button>';
    });
    html += '</div>';

    // Code blocks (one per fork, latest visible initially)
    codeForkNames.forEach((f, i) => {
      const code = getCodeForFork(item, f);
      const fd = item.forks[f];
      const isLast = i === codeForkNames.length - 1;
      const forkGithubUrl = (item.forks[f] && item.forks[f].github_url) || '';
      html += '<div class="fork-code-block" data-tabs="' + esc(tabId) + '" data-fork="' + esc(f) + '" data-github-url="' + esc(forkGithubUrl) + '" style="' + (isLast ? '' : 'display:none') + '">';

      if (code) {
        html += '<pre class="code-block" style="max-height:600px">' + highlightPython(code) + '</pre>';
      } else {
        html += '<div style="padding:12px;color:var(--text-dim);font-size:12px">No definition in this fork.</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  } else if (latestData.fields && latestData.fields.length) {
    // No code anywhere -- show fields table + pseudo-definition
    html += '<div class="detail-section"><h3>Definition <span style="font-size:10px;font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-dim)">(from schema)</span></h3>';
    html += '<table class="data-table" style="margin-bottom:12px"><thead><tr><th>Name</th><th>Type</th><th>Description</th></tr></thead><tbody>';
    latestData.fields.forEach(f => {
      html += '<tr><td>' + esc(f.name) + '</td><td>' + typeLink(f.type, spec) + '</td><td style="font-family:var(--font-sans);font-size:12px;color:var(--text-muted)">' + esc(f.description || '') + '</td></tr>';
    });
    html += '</tbody></table>';
    let pseudo = 'class ' + name + '(Container):\n';
    latestData.fields.forEach(f => {
      pseudo += '    ' + f.name + ': ' + (f.type || 'unknown');
      if (f.description) pseudo += '  # ' + f.description;
      pseudo += '\n';
    });
    html += '<pre class="code-block">' + highlightPython(pseudo) + '</pre>';
    html += '</div>';
  }

  // Prose/description (after code so it doesn't push code below the fold)
  if (latestData.prose) {
    html += '<div class="detail-section"><h3>Description</h3><div class="prose" style="border-left:3px solid var(--cyan);padding-left:12px;font-size:13px;color:var(--text-muted);line-height:1.7;white-space:pre-wrap">' + esc(latestData.prose) + '</div></div>';
  }

  // Params + return (for functions, shown after definition)
  if (latestData.params && latestData.params.length) {
    html += '<div class="detail-section"><h3>Parameters</h3>';
    html += '<table class="data-table"><thead><tr><th>Name</th><th>Type</th></tr></thead><tbody>';
    latestData.params.forEach(p => {
      const pName = typeof p === 'string' ? p : (p.name || p);
      const pType = typeof p === 'object' ? (p.type || '') : '';
      html += '<tr><td>' + esc(pName) + '</td><td>' + typeLink(pType, spec) + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }
  if (latestData.return_type) {
    html += '<div class="detail-section"><h3>Returns</h3><div>' + typeLink(latestData.return_type, spec) + '</div></div>';
  }

  // References
  if (latestData.references && latestData.references.length) {
    html += '<div class="detail-section"><h3>References</h3>';
    html += '<div class="pill-group">';
    latestData.references.forEach((ref, i) => { html += typeLink(ref, spec); if (i < latestData.references.length - 1) html += ', '; });
    html += '</div></div>';
  }

  html += '</div>';
  return html;
}

/* ══════════════════════════════════════════════════════════════
   VIEW 4: ENDPOINT BROWSER
   ══════════════════════════════════════════════════════════════ */
function setEpFilter(key, value) {
  epFilters[key] = value;
  if (key === 'spec') epFilters.group = '';
  route();
}

function renderEndpointBrowser(container, params, selected) {
  if (params.spec !== undefined && !selected) {
    if (params.spec) epFilters.spec = params.spec;
    if (params.method) epFilters.method = params.method;
    if (params.domain) epFilters.domain = params.domain;
    if (params.group) epFilters.group = params.group;
  }
  const filterSpec = epFilters.spec;
  const filterMethod = epFilters.method;
  const filterDomain = epFilters.domain;
  const filterGroup = epFilters.group;

  // Facets
  const specs = {}, methods = {}, domains = {};
  allEndpoints.forEach(ep => {
    specs[ep._spec] = (specs[ep._spec]||0) + 1;
    if (ep.method) methods[ep.method] = (methods[ep.method]||0) + 1;
    if (ep.domain) domains[ep.domain] = (domains[ep.domain]||0) + 1;
  });

  // Compute path-prefix groups for the selected spec
  function epGroup(ep) {
    var p = ep.path || ep._key || '';
    // REST APIs: extract version segment (e.g. /eth/v1/... -> v1)
    var vm = p.match(/^\/[^/]+\/(v\d+)\//);
    if (vm) return vm[1];
    // JSON-RPC methods: extract namespace prefix (e.g. engine_foo -> engine)
    var nm = p.match(/^([a-z]+)_/);
    if (nm) return nm[1];
    return '';
  }

  // Only compute groups within current spec filter
  const groups = {};
  if (filterSpec) {
    allEndpoints.forEach(function(ep) {
      if (ep._spec !== filterSpec) return;
      var g = epGroup(ep);
      if (g) groups[g] = (groups[g] || 0) + 1;
    });
  }

  let filtered = allEndpoints.filter(ep => {
    if (filterSpec && ep._spec !== filterSpec) return false;
    if (filterMethod && ep.method !== filterMethod) return false;
    if (filterDomain && ep.domain !== filterDomain) return false;
    if (filterGroup && epGroup(ep) !== filterGroup) return false;
    if (searchQuery) {
      const pathMatch = fuzzyScore(ep.path, searchQuery);
      const sumMatch = ep.summary ? fuzzyScore(ep.summary, searchQuery) : null;
      const opMatch = ep.operation_id ? fuzzyScore(ep.operation_id, searchQuery) : null;
      if (pathMatch === null && sumMatch === null && opMatch === null) return false;
    }
    return true;
  });

  if (searchQuery) {
    filtered.sort((a, b) => {
      const sa = Math.max(fuzzyScore(a.path, searchQuery) || -999, fuzzyScore(a.summary||'', searchQuery) || -999);
      const sb = Math.max(fuzzyScore(b.path, searchQuery) || -999, fuzzyScore(b.summary||'', searchQuery) || -999);
      return sb - sa;
    });
  } else {
    filtered.sort((a,b) => a.path.localeCompare(b.path));
  }

  // Sidebar
  let sideHtml = '<div class="sidebar-section"><h3>Specs</h3>';
  sideHtml += epFilterBtn('', 'All specs', allEndpoints.length, filterSpec === '', 'spec');
  for (const [s,c] of Object.entries(specs).sort((a,b)=>b[1]-a[1])) {
    sideHtml += epFilterBtn(s, s, c, filterSpec === s, 'spec');
  }
  sideHtml += '</div>';

  if (Object.keys(groups).length > 1) {
    sideHtml += '<div class="sidebar-section"><h3>Group</h3>';
    sideHtml += epFilterBtn('', 'All', '', filterGroup === '', 'group');
    for (const [g,cnt] of Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0]))) {
      sideHtml += epFilterBtn(g, g, cnt, filterGroup === g, 'group');
    }
    sideHtml += '</div>';
  }

  // Build list with active state
  const selName = selected ? selected.name : null;
  const selSpec = selected ? selected.spec : null;
  let listHtml = '<div class="list-header"><span>' + filtered.length + ' endpoints</span></div>';
  const renderCount = Math.min(filtered.length, 300);
  for (let i = 0; i < renderCount; i++) {
    const ep = filtered[i];
    const isActive = (ep._key === selName && ep._spec === selSpec);
    listHtml += '<div class="list-item' + (isActive ? ' active' : '') + '" onclick="navigate(\'#/endpoint/' +
      encodeURIComponent(ep._spec) + '/' + encodeURIComponent(ep._key) + '\')" style="gap:6px">' +
      methodBadge(ep.method) +
      '<span class="item-name" style="flex:none;max-width:250px">' + (searchQuery ? fuzzyHighlight(ep.path, searchQuery) : esc(ep.path)) + '</span>' +
      '<span style="font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">' + esc(ep.summary || '') + '</span>' +
      specBadge(ep._spec) +
      '</div>';
  }

  // Build detail panel
  let detailHtml;
  if (selected) {
    detailHtml = renderEndpointDetailContent(selected.spec, selected.name);
  } else {
    detailHtml = '<div class="empty-state"><div class="icon">🔌</div><div>Select an endpoint to view details</div></div>';
  }

  container.innerHTML =
    '<div class="panel-sidebar">' + sideHtml + '</div>' +
    '<div class="panel-list">' + listHtml + '</div>' +
    '<div class="panel-detail">' + detailHtml + '</div>';

  if (selected) {
    const activeRow = container.querySelector('.list-item.active');
    if (activeRow) activeRow.scrollIntoView({ block: 'nearest' });
  }
}

function epFilterBtn(value, label, count, active, filterType) {
  return '<button class="filter-btn' + (active ? ' active' : '') + '" onclick="setEpFilter(\'' + filterType + '\', \'' + esc(value) + '\')">' +
    '<span>' + esc(label) + '</span>' +
    (count ? '<span class="count">' + count + '</span>' : '') +
    '</button>';
}

  'state_id': 'head',

const specPorts = {
  'beacon-apis': 5052,
  'builder-specs': 18550,
  'relay-specs': 18550,
  'remote-signing-api': 9000,
};

function buildCurlFromInputs(ep, spec, mode) {
  const port = specPorts[spec] || 5052;
  const base = 'http://localhost:' + port;
  const parts = ['curl'];

  if (ep.method !== 'GET') parts.push('-X ' + ep.method);

  let path = ep.path;
  const inputs = mode ? document.querySelectorAll('.curl-input') : [];
  const pathVals = {};
  const queryVals = {};
  inputs.forEach(function(inp) {
    if (inp.dataset.in === 'path') pathVals[inp.dataset.param] = inp.value;
    else if (inp.dataset.in === 'query' && inp.value) queryVals[inp.dataset.param] = inp.value;
  });

  path = path.replace(/\{([^}]+)\}/g, (match, name) => {
    return pathVals[name] || curlPathDefaults[name] || '<' + name + '>';
  });

  let url = base + path;

  // Query string
  const qs = Object.entries(queryVals).map(([k,v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)).join('&');
  if (qs) url += '?' + qs;

  parts.push("'" + url + "'");

  // Headers
  if (ep.method === 'POST' || ep.method === 'PUT') {
    parts.push("-H 'Content-Type: application/json'");
  }
  const cn = ep.content_negotiation;
  if (cn && cn.ssz_support) {
    parts.push("-H 'Accept: application/json'");
  }

  // Body
  if (ep.request_body) {
    parts.push("-d '{...}'");
  }

  let cmd = parts.join(' \\\n  ');

  if (cn && cn.ssz_support) {
    cmd += '\n\n# For SSZ: -H \'Accept: application/octet-stream\'';
  }

  return cmd;
}

var _pendingCurlEp = null;

function rebuildCurl() {
  if (!_pendingCurlEp) return;
  var cmd = buildCurlFromInputs(_pendingCurlEp, _pendingCurlEp.spec, 'live');
  var output = document.getElementById('curl-output');
  if (output) output.textContent = cmd;
}

// Event delegation: any input inside the curl section triggers a rebuild
document.addEventListener('input', function(e) {
  if (e.target.classList.contains('curl-input')) {
    rebuildCurl();
  }
});

      });
      queryParams.forEach(function(p) {
        html += '<label style="font-size:11px;color:var(--text-muted);display:flex;flex-direction:column;gap:2px">';
        html += '<span>' + esc(p.name) + (p.type === 'array' ? ' <span style="color:var(--text-dim)">csv</span>' : '') + '</span>';

        html += '</label>';

    }

    var initCmd = buildCurlFromInputs(ep, spec, null);
    html += '<pre class="code-block" id="curl-output">' + esc(initCmd) + '</pre>';
    html += '</div>';

    // Store current endpoint data for live updates (set after innerHTML)
    _pendingCurlEp = { method: ep.method, path: ep.path, spec: spec, content_negotiation: ep.content_negotiation || null, request_body: !!(ep.request_body && (ep.method === 'POST' || ep.method === 'PUT')) };
  }

  // Summary / Description
  if (ep.summary) {
    html += '<div class="detail-section"><h3>Summary</h3><div class="prose">' + esc(ep.summary) + '</div></div>';
  }
  if (ep.description && ep.description !== ep.summary) {
    html += '<div class="detail-section"><h3>Description</h3><div class="prose">' + esc(ep.description) + '</div></div>';
  }

  // Parameters
  if (ep.parameters && ep.parameters.length) {
    html += '<div class="detail-section"><h3>Parameters (' + ep.parameters.length + ')</h3>';
    html += '<table class="data-table"><thead><tr><th>Name</th><th>In</th><th>Type</th><th>Required</th><th>Description</th></tr></thead><tbody>';

        esc(p.description || '') + '</td></tr>';

  // Request body

    html += '<div class="detail-section"><h3>Request Body</h3>';
    html += '<div class="code-block">' + esc(JSON.stringify(ep.request_body, null, 2)) + '</div>';

  // Responses
  if (ep.responses) {
    html += '<div class="detail-section"><h3>Responses</h3>';
    for (const [code, resp] of Object.entries(ep.responses)) {
      html += '<div style="margin-bottom:8px"><span class="badge ' +

      } else {

          html += '<div class="code-block" style="margin-top:4px">' + esc(JSON.stringify(resp.content || resp.schema, null, 2)) + '</div>';

  // Result (JSON-RPC)
  if (ep.result) {

  }

  // Errors
  if (ep.errors && ep.errors.length) {
    html += '<div class="detail-section"><h3>Errors</h3>';
    html += '<table class="data-table"><thead><tr><th>Code</th><th>Message</th></tr></thead><tbody>';
    ep.errors.forEach(e => {
      html += '<tr><td>' + esc(String(e.code || '')) + '</td><td style="font-family:var(--font-sans)">' + esc(e.message || JSON.stringify(e)) + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }

  // Fork versioning
  if (ep.fork_versioned || ep.fork_variants) {
    html += '<div class="detail-section"><h3>Fork Versioning</h3>';
    if (ep.fork_versioned) html += '<div style="font-size:12px;color:var(--text-muted)">Fork versioned: ' + esc(String(ep.fork_versioned)) + '</div>';

    }

  }

  // External docs
  if (ep.external_docs) {

    } else {
      html += '<a href="' + esc(ep.external_docs.url || '') + '" target="_blank">' + esc(ep.external_docs.description || ep.external_docs.url || '') + '</a>';
    }
    html += '</div>';
  }

  html += '</div>';
  return html;
}

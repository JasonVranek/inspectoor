function getAllPRs() {
  const prs = [];
  const overlays = catalog.pr_overlays || {};
  for (const spec in overlays) {
    for (const prId in overlays[spec]) {
      const ov = overlays[spec][prId];
      const items = ov.items_changed || {};
      const counts = { added: 0, modified: 0, removed: 0 };
      for (const name in items) {
        const a = items[name].action;
        if (counts[a] !== undefined) counts[a]++;
      }
      prs.push({
        spec,
        prId,
        number: ov.number,
        title: ov.title,
        author: ov.author,
        url: ov.url,
        itemCount: Object.keys(items).length,
        constCount: Object.keys(ov.constants_changed || {}).length,
        counts,
        overlay: ov
      });
    }
  }
  prs.sort((a, b) => b.number - a.number);
  return prs;
}

function renderPRBrowser(container, params) {
  const allPRs = getAllPRs();
  const selectedPR = params.pr || '';
  const expandItem = params.item || '';

  if (!allPRs.length) {
    container.innerHTML = '<div class="panel-full"><div class="empty-state"><div class="icon">📋</div><div>No PR overlays indexed.</div><div style="font-size:12px;color:var(--text-dim)">Use the MCP <code>index_pr</code> tool to index a spec PR.</div></div></div>';
    return;
  }

  let html = '<div class="panel-sidebar" style="width:300px;min-width:300px">';
  html += '<div style="padding:12px 14px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-muted)">';
  html += allPRs.length + ' indexed PR' + (allPRs.length !== 1 ? 's' : '');
  html += '</div>';

  allPRs.forEach(pr => {
    const isActive = String(pr.number) === String(selectedPR);
    html += '<div class="pr-sidebar-item' + (isActive ? ' active' : '') + '" onclick="navigate(\'#/prs?pr=' + pr.number + '\')">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center">';
    html += '<span class="pr-num">#' + pr.number + '</span>';
    html += specBadge(pr.spec);
    html += '</div>';
    html += '<div class="pr-title">' + esc(pr.title) + '</div>';
    html += '<div class="pr-author">by ' + esc(pr.author) + '</div>';
    html += '<div class="pr-stats">';
    if (pr.counts.added) html += '<span class="pr-action-badge added">+' + pr.counts.added + '</span>';
    if (pr.counts.modified) html += '<span class="pr-action-badge modified">~' + pr.counts.modified + '</span>';
    if (pr.counts.removed) html += '<span class="pr-action-badge removed">-' + pr.counts.removed + '</span>';
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';

  // Detail panel
  html += '<div class="panel-detail" style="flex:1;overflow-y:auto">';

  if (!selectedPR) {
    html += '<div class="empty-state"><div class="icon">👈</div><div>Select a PR to view changes</div></div>';
  } else {
    const pr = allPRs.find(p => String(p.number) === String(selectedPR));
    if (!pr) {
      html += '<div class="empty-state"><div class="icon">❓</div><div>PR #' + esc(selectedPR) + ' not found</div></div>';
    } else {
      html += renderPRDetail(pr, expandItem);
    }
  }

  html += '</div>';
  container.innerHTML = html;

  // Auto-expand item if specified
  if (expandItem && selectedPR) {
    setTimeout(function() {
      const itemEl = document.getElementById('pr-item-' + expandItem.replace(/[^a-zA-Z0-9]/g, '_'));
      if (itemEl) {
        itemEl.click();
        itemEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }, 50);
  }
}

function renderPRDetail(pr, expandItem) {
  const ov = pr.overlay;
  const items = ov.items_changed || {};

  let html = '<div class="pr-header">';
  html += '<h2>PR #' + pr.number + ': ' + esc(pr.title) + '</h2>';
  html += '<div class="pr-meta">';
  html += 'by ' + esc(pr.author) + ' · ';
  html += specBadge(pr.spec) + ' · ';
  html += pr.itemCount + ' item' + (pr.itemCount !== 1 ? 's' : '');
  if (pr.constCount) html += ' · ' + pr.constCount + ' constant' + (pr.constCount !== 1 ? 's' : '');
  html += ' &nbsp;';
  html += '<a href="' + esc(pr.url) + '" target="_blank" rel="noopener" style="color:var(--accent)">View on GitHub ↗</a>';
  html += '</div></div>';

  // Group items by action
  const groups = { added: [], modified: [], removed: [] };
  for (const name in items) {
    const action = items[name].action;
    if (groups[action]) groups[action].push(name);
    else groups.modified.push(name); // fallback
  }
  // Sort each group alphabetically
  for (const g in groups) groups[g].sort();

  if (groups.added.length) {
    html += '<div class="diff-group">';
    html += '<h3 style="color:var(--green)">✚ Added <span class="count-badge" style="background:rgba(63,185,80,0.15);color:var(--green)">' + groups.added.length + '</span></h3>';
    groups.added.forEach(name => {
      html += renderPRItemRow(name, items[name], pr, 'added');
    });
    html += '</div>';
  }

  if (groups.modified.length) {
    html += '<div class="diff-group">';
    html += '<h3 style="color:var(--orange)">✎ Modified <span class="count-badge" style="background:rgba(210,153,34,0.15);color:var(--orange)">' + groups.modified.length + '</span></h3>';
    groups.modified.forEach(name => {
      html += renderPRItemRow(name, items[name], pr, 'modified');
    });
    html += '</div>';
  }

  if (groups.removed.length) {
    html += '<div class="diff-group">';
    html += '<h3 style="color:var(--red)">✖ Removed <span class="count-badge" style="background:rgba(248,81,73,0.15);color:var(--red)">' + groups.removed.length + '</span></h3>';
    groups.removed.forEach(name => {
      html += renderPRItemRow(name, items[name], pr, 'removed');
    });
    html += '</div>';
  }

  return html;
}

function renderPRItemRow(name, item, pr, action) {
  const safeId = name.replace(/[^a-zA-Z0-9]/g, '_');
  const previewId = 'pr-preview-' + safeId;
  const hasContent = item.code || (action === 'removed' && catalog.items[name]);

  let html = '<div class="pr-item-row" id="pr-item-' + safeId + '"';
  if (hasContent) {
    html += ' onclick="togglePRPreview(this, \'' + esc(name) + '\', ' + pr.number + ', \'' + esc(pr.spec) + '\')"';
  }
  html += '>';

  // Action prefix
  const prefixMap = { added: '+', modified: '~', removed: '-' };
  const colorMap = { added: 'var(--green)', modified: 'var(--orange)', removed: 'var(--red)' };
  html += '<span style="color:' + colorMap[action] + ';font-family:var(--font-mono);width:14px;flex-shrink:0">' + prefixMap[action] + '</span>';

  // Name (strikethrough for removed)
  const nameStyle = action === 'removed' ? 'text-decoration:line-through;color:var(--red)' : '';
  html += '<span class="pr-item-name" style="' + nameStyle + '">' + esc(name) + '</span>';

  // Kind badge
  if (item.kind) html += kindBadge(item.kind);

  // Domain
  if (item.domain) html += '<span style="font-size:11px;color:var(--text-dim)">' + esc(item.domain) + '</span>';

  // Field delta for modified items
  if (action === 'modified' && item.diff_summary) {
    const ds = item.diff_summary;
    const parts = [];
    if (ds.fields_added && ds.fields_added.length) parts.push('+' + ds.fields_added.length + ' field');
    if (ds.fields_removed && ds.fields_removed.length) parts.push('-' + ds.fields_removed.length + ' field');
    if (ds.fields_modified && ds.fields_modified.length) parts.push('~' + ds.fields_modified.length + ' field');
    if (parts.length) {
      html += '<span class="pr-field-delta">' + parts.join(', ') + '</span>';
    }
  }

  // Expand indicator
  if (hasContent) html += '<span style="color:var(--text-dim);font-size:10px;margin-left:auto;flex-shrink:0">▶</span>';

  html += '</div>';
  html += '<div class="pr-item-preview" id="' + previewId + '"></div>';
  return html;
}

function togglePRPreview(el, name, prNumber, specName) {
  const safeId = name.replace(/[^a-zA-Z0-9]/g, '_');
  const preview = document.getElementById('pr-preview-' + safeId);
  if (!preview) return;

  if (preview.style.display !== 'none' && preview.style.display !== '') {
    preview.style.display = 'none';
    el.classList.remove('expanded');
    const arrow = el.querySelector('span:last-child');
    if (arrow && arrow.textContent === '▼') arrow.textContent = '▶';
    return;
  }

  el.classList.add('expanded');
  preview.style.display = 'block';
  const arrow = el.querySelector('span:last-child');
  if (arrow && arrow.textContent === '▶') arrow.textContent = '▼';

  // Get PR overlay data
  const overlays = catalog.pr_overlays || {};
  const specOverlays = overlays[specName] || {};
  const overlay = specOverlays[String(prNumber)];
  if (!overlay) { preview.innerHTML = '<div style="padding:8px;color:var(--text-dim)">Overlay not found.</div>'; return; }

  const prItem = overlay.items_changed[name];
  if (!prItem) { preview.innerHTML = '<div style="padding:8px;color:var(--text-dim)">Item not found in overlay.</div>'; return; }

  const action = prItem.action;
  let ph = '';

  // Meta line
  const meta = [];
  if (prItem.kind) meta.push(prItem.kind);
  if (prItem.domain) meta.push(prItem.domain);
  if (prItem.fork) meta.push(prItem.fork);
  const mainItem = catalog.items[name];
  ph += '<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">' + meta.join(' · ');
  if (mainItem) ph += ' <a href="#/type/' + encodeURIComponent(name) + '" style="color:var(--accent);font-size:10px" onclick="event.stopPropagation()">open type →</a>';
  if (prItem.github_url) ph += ' <a href="' + esc(prItem.github_url) + '" target="_blank" rel="noopener" style="color:var(--text-muted);font-size:10px" onclick="event.stopPropagation()">source ↗</a>';
  ph += '</div>';

  if (action === 'modified') {
    // Side-by-side code diff
    const prCode = prItem.code || '';
    const mainCode = mainItem ? getCodeForFork(mainItem, prItem.fork || '') : '';

    if (prCode && mainCode && prCode !== mainCode) {
      ph += renderDiffCodeBlocks(mainCode, prCode, 'mainline (' + esc(prItem.fork || '') + ')', 'PR #' + prNumber);
    } else if (prCode) {
      ph += '<pre class="code-block" style="max-height:400px;font-size:11px">' + highlightPython(prCode) + '</pre>';
    } else {
      ph += '<div style="padding:8px;color:var(--text-dim);font-size:12px">Code changed but no definition available.</div>';
    }

    // Field diff table
    const ds = prItem.diff_summary;
    if (ds && (ds.fields_added && ds.fields_added.length || ds.fields_removed && ds.fields_removed.length || ds.fields_modified && ds.fields_modified.length)) {
      ph += '<table class="data-table" style="margin-top:8px;font-size:12px"><thead><tr><th>Field</th><th>Change</th></tr></thead><tbody>';
      if (ds.fields_added) ds.fields_added.forEach(f => {
        ph += '<tr class="field-diff-added"><td style="color:var(--green)">+ ' + esc(f) + '</td><td>added</td></tr>';
      });
      if (ds.fields_removed) ds.fields_removed.forEach(f => {
        ph += '<tr class="field-diff-removed"><td style="color:var(--red)">- ' + esc(f) + '</td><td>removed</td></tr>';
      });
      if (ds.fields_modified) ds.fields_modified.forEach(f => {
        ph += '<tr><td style="color:var(--orange)">~ ' + esc(f) + '</td><td>modified</td></tr>';
      });
      ph += '</tbody></table>';
    }

  } else if (action === 'added') {
    // New item: single code block
    if (prItem.code) {
      ph += '<pre class="code-block" style="max-height:400px;font-size:11px">' + highlightPython(prItem.code) + '</pre>';
    }
    // Fields table
    if (prItem.fields && prItem.fields.length) {
      ph += '<table class="data-table" style="margin-top:8px;font-size:12px"><thead><tr><th>Field</th><th>Type</th></tr></thead><tbody>';
      prItem.fields.forEach(f => {
        ph += '<tr><td>' + esc(f.name) + '</td><td>' + typeLink(f.type, specName) + '</td></tr>';
      });
      ph += '</tbody></table>';
    }

  } else if (action === 'removed') {
    // Show mainline code being removed
    if (mainItem) {
      const removedCode = getCodeForFork(mainItem, prItem.fork || '');
      if (removedCode) {
        ph += '<div style="font-size:10px;color:var(--red);margin-bottom:4px">Removed definition:</div>';
        ph += '<pre class="code-block" style="max-height:400px;font-size:11px;opacity:0.7;border-color:rgba(248,81,73,0.3)">' + highlightPython(removedCode) + '</pre>';
      }
    } else {
      ph += '<div style="padding:8px;color:var(--text-dim);font-size:12px">Removed (no mainline definition available).</div>';
    }
  }

  // References
  if (prItem.references && prItem.references.length) {
    ph += '<div style="margin-top:8px;font-size:11px;color:var(--text-muted)">refs: ';
    prItem.references.forEach((ref, i) => {
      ph += typeLink(ref, specName);
      if (i < prItem.references.length - 1) ph += ', ';
    });
    ph += '</div>';
  }

  preview.innerHTML = ph;
}

function findPRsForType(typeName) {
  const results = [];
  const overlays = catalog.pr_overlays || {};
  for (const spec in overlays) {
    for (const prId in overlays[spec]) {
      const ov = overlays[spec][prId];
      if (ov.items_changed && ov.items_changed[typeName]) {
        const item = ov.items_changed[typeName];
        const ds = item.diff_summary || {};
        let summary = item.action;
        if (ds.fields_added && ds.fields_added.length) summary += ', +' + ds.fields_added.length + ' field';
        if (ds.fields_removed && ds.fields_removed.length) summary += ', -' + ds.fields_removed.length + ' field';
        results.push({
          number: ov.number,
          title: ov.title,
          action: item.action,
          summary: summary,
          spec: spec
        });
      }
    }
  }
  return results;
}

function renderDiffView(container, params) {
  const specName = params.spec || Object.keys(catalog.specs)[0];
  const specData = catalog.specs[specName];
  const forkOrder = sortForks((specData && specData.meta && specData.meta.fork_order) || []);
  const fromFork = params.from || (forkOrder.length > 1 ? forkOrder[forkOrder.length - 2] : forkOrder[0] || '');
  const toFork = params.to || forkOrder[forkOrder.length - 1] || '';
  const fromIdx = forkOrder.indexOf(fromFork);

  let html = '<div class="panel-full">';
  html += '<h2 style="font-size:18px;margin-bottom:16px;font-family:var(--font-mono)">Fork Diff</h2>';

  // Controls
  html += '<div class="diff-controls">';
  html += '<label style="font-size:12px;color:var(--text-muted)">Spec:</label>';
  html += '<select onchange="navigateDiff(this.value, null, null)">';
  for (const s of Object.keys(catalog.specs)) {
    html += '<option value="' + esc(s) + '"' + (s === specName ? ' selected' : '') + '>' + esc(s) + '</option>';
  }
  html += '</select>';

  html += '<label style="font-size:12px;color:var(--text-muted)">From:</label>';
  html += '<select onchange="diffUpdateFrom(this.value)" id="diff-from">';
  forkOrder.forEach(f => {
    html += '<option value="' + esc(f) + '"' + (f === fromFork ? ' selected' : '') + '>' + esc(f) + '</option>';
  });
  html += '</select>';

  html += '<span style="color:var(--text-dim)">→</span>';

  html += '<label style="font-size:12px;color:var(--text-muted)">To:</label>';
  html += '<select onchange="navigateDiff(null, null, this.value)" id="diff-to">';
  forkOrder.forEach((f, i) => {
    const disabled = i <= fromIdx;
    html += '<option value="' + esc(f) + '"' + (f === toFork ? ' selected' : '') + (disabled ? ' disabled style="color:var(--text-dim)"' : '') + '>' + esc(f) + '</option>';
  });
  // Add PR forks as options
  const prOverlays = (catalog.pr_overlays || {})[specName] || {};
  const prIds = Object.keys(prOverlays);
  if (prIds.length) {
    html += '<option disabled>──── PRs ────</option>';
    prIds.forEach(prId => {
      const pov = prOverlays[prId];
      const prFork = 'pr-' + pov.number;
      const label = 'PR #' + pov.number + ': ' + (pov.title || '').slice(0, 40) + (pov.title && pov.title.length > 40 ? '...' : '');
      html += '<option value="' + esc(prFork) + '"' + (prFork === toFork ? ' selected' : '') + '>' + esc(label) + '</option>';
    });
  }
  html += '</select>';
  html += '</div>';

  // Compute diff
  // Handle PR forks
  if (toFork.startsWith('pr-')) {
    const prNum = toFork.slice(3);
    const prOv = ((catalog.pr_overlays || {})[specName] || {})[prNum];
    if (prOv && prOv.items_changed) {
      const prItems = prOv.items_changed;
      const groups = { added: [], modified: [], removed: [] };
      for (const n in prItems) {
        const a = prItems[n].action;
        if (groups[a]) groups[a].push(n);
      }
      for (const g in groups) groups[g].sort();

      html += '<div style="font-size:13px;color:var(--text-muted);margin-bottom:12px">';
      html += '<a href="' + esc(prOv.url || '') + '" target="_blank" rel="noopener" style="color:var(--accent)">PR #' + prNum + '</a>: ' + esc(prOv.title || '') + ' by ' + esc(prOv.author || '');
      html += '</div>';

      if (groups.added.length) {
        html += '<div class="diff-group"><h3 style="color:var(--green)">✚ Added <span class="count-badge" style="background:rgba(63,185,80,0.15);color:var(--green)">' + groups.added.length + '</span></h3>';
        groups.added.forEach(n => {
          const itemId = 'diff-preview-' + n.replace(/[^a-zA-Z0-9]/g, '_');
          html += '<div class="diff-item" onclick="toggleDiffPreview(this, \'' + esc(n) + '\', \'' + esc(toFork) + '\', \'' + esc(specName) + '\', null)" style="color:var(--green)">+ ' + esc(n) + '</div>';
          html += '<div class="diff-item-preview" id="' + itemId + '" style="display:none"></div>';
        });
        html += '</div>';
      }
      if (groups.modified.length) {
        html += '<div class="diff-group"><h3 style="color:var(--orange)">✎ Modified <span class="count-badge" style="background:rgba(210,153,34,0.15);color:var(--orange)">' + groups.modified.length + '</span></h3>';
        groups.modified.forEach(n => {
          const itemId = 'diff-preview-' + n.replace(/[^a-zA-Z0-9]/g, '_');
          html += '<div class="diff-item" onclick="toggleDiffPreview(this, \'' + esc(n) + '\', \'' + esc(toFork) + '\', \'' + esc(specName) + '\', \'' + esc(fromFork) + '\')" style="color:var(--orange)">~ ' + esc(n) + '</div>';
          html += '<div class="diff-item-preview" id="' + itemId + '" style="display:none"></div>';
        });
        html += '</div>';
      }
      if (groups.removed.length) {
        html += '<div class="diff-group"><h3 style="color:var(--red)">✖ Removed <span class="count-badge" style="background:rgba(248,81,73,0.15);color:var(--red)">' + groups.removed.length + '</span></h3>';
        groups.removed.forEach(n => {
          const itemId = 'diff-preview-' + n.replace(/[^a-zA-Z0-9]/g, '_');
          html += '<div class="diff-item" style="color:var(--red);text-decoration:line-through">- ' + esc(n) + '</div>';
          html += '<div class="diff-item-preview" id="' + itemId + '" style="display:none"></div>';
        });
        html += '</div>';
      }

      if (!groups.added.length && !groups.modified.length && !groups.removed.length) {
        html += '<div style="color:var(--text-dim);font-size:13px;margin-top:20px">No changes in this PR.</div>';
      }
    } else {
      html += '<div style="color:var(--text-dim);font-size:13px;margin-top:20px">PR overlay not found.</div>';
    }
  } else {

  // Standard fork diff
  const forkSummary = specData && specData.fork_summary;
  if (forkSummary && forkSummary[toFork]) {
    const fs = forkSummary[toFork];
    const newItems = fs.new || [];
    const modifiedItems = fs.modified || [];
    const newMethods = fs.new_methods || [];

    if (newItems.length) {
      html += '<div class="diff-group">';
      html += '<h3 style="color:var(--green)">✚ New in ' + esc(toFork) + ' <span class="count-badge" style="background:rgba(63,185,80,0.15);color:var(--green)">' + newItems.length + '</span></h3>';
      newItems.forEach(name => {
        const itemId = 'diff-preview-' + name.replace(/[^a-zA-Z0-9]/g, '_');
        html += '<div class="diff-item" onclick="toggleDiffPreview(this, \'' + esc(name) + '\', \'' + esc(toFork) + '\', \'' + esc(specName) + '\', null)" style="color:var(--green)">' +
          '+ ' + esc(name) + '</div>';
        html += '<div class="diff-item-preview" id="' + itemId + '" style="display:none"></div>';
      });
      html += '</div>';
    }

    if (modifiedItems.length) {
      html += '<div class="diff-group">';
      html += '<h3 style="color:var(--orange)">✎ Modified in ' + esc(toFork) + ' <span class="count-badge" style="background:rgba(210,153,34,0.15);color:var(--orange)">' + modifiedItems.length + '</span></h3>';
      modifiedItems.forEach(name => {
        const itemId = 'diff-preview-' + name.replace(/[^a-zA-Z0-9]/g, '_');
        html += '<div class="diff-item" onclick="toggleDiffPreview(this, \'' + esc(name) + '\', \'' + esc(toFork) + '\', \'' + esc(specName) + '\', \'' + esc(fromFork) + '\')" style="color:var(--orange)">' +
          '~ ' + esc(name) + '</div>';
        html += '<div class="diff-item-preview" id="' + itemId + '" style="display:none"></div>';
      });
      html += '</div>';
    }

    if (newMethods && newMethods.length) {
      html += '<div class="diff-group">';
      html += '<h3 style="color:var(--cyan)">⚡ New Methods in ' + esc(toFork) + ' <span class="count-badge" style="background:rgba(57,210,192,0.15);color:var(--cyan)">' + newMethods.length + '</span></h3>';
      newMethods.forEach(name => {
        const itemId = 'diff-preview-' + name.replace(/[^a-zA-Z0-9]/g, '_');
        html += '<div class="diff-item" onclick="toggleDiffPreview(this, \'' + esc(name) + '\', \'' + esc(toFork) + '\', \'' + esc(specName) + '\', null)" style="color:var(--cyan)">' +
          '+ ' + esc(name) + '</div>';
        html += '<div class="diff-item-preview" id="' + itemId + '" style="display:none"></div>';
      });
      html += '</div>';
    }

    if (!newItems.length && !modifiedItems.length && !newMethods.length) {
      html += '<div style="color:var(--text-dim);font-size:13px;margin-top:20px">No changes recorded for ' + esc(toFork) + ' in this spec.</div>';
    }

    // Also show EIPs for this fork if any
    if (fs.eips && fs.eips.length) {
      html += '<div class="diff-group">';
      html += '<h3 style="color:var(--accent)">📜 Related EIPs</h3>';
      html += '<div class="pill-group">';
      fs.eips.forEach(eip => {
        const num = String(eip).replace(/^eip-?/i, '');
        html += '<a href="https://eips.ethereum.org/EIPS/eip-' + num + '" target="_blank" class="badge" style="background:rgba(88,166,255,0.1);color:var(--accent)">EIP-' + esc(num) + '</a> ';
      });
      html += '</div></div>';
    }

  } else {
    html += '<div style="color:var(--text-dim);font-size:13px;margin-top:20px">No fork summary data available for this selection.</div>';
  }

  // Show all forks summary
  if (forkSummary) {
    html += '<div class="detail-section" style="margin-top:24px"><h3>All Forks Summary for ' + esc(specName) + '</h3>';
    html += '<table class="data-table"><thead><tr><th>Fork</th><th>New</th><th>Modified</th><th>Total Defs</th></tr></thead><tbody>';
    forkOrder.forEach(f => {
      const fs = forkSummary[f];
      if (fs) {
        html += '<tr onclick="navigate(\'#/diff/' + encodeURIComponent(specName) + '?spec=' + encodeURIComponent(specName) + '&to=' + encodeURIComponent(f) + '\')" style="cursor:pointer">' +
          '<td>' + forkBadge(f) + '</td>' +
          '<td style="color:var(--green)">' + (fs.new ? fs.new.length : 0) + '</td>' +
          '<td style="color:var(--orange)">' + (fs.modified ? fs.modified.length : 0) + '</td>' +
          '<td>' + (fs.total_definitions || '—') + '</td></tr>';
      }
    });
    html += '</tbody></table></div>';
  }

  html += '</div>';
  } // close PR else block
  container.innerHTML = html;
}


function toggleDiffPreview(el, name, toFork, specName, fromFork) {
  const previewId = 'diff-preview-' + name.replace(/[^a-zA-Z0-9]/g, '_');
  const preview = document.getElementById(previewId);
  if (!preview) return;

  // Toggle
  if (preview.style.display !== 'none') {
    preview.style.display = 'none';
    el.classList.remove('expanded');
    return;
  }

  el.classList.add('expanded');
  preview.style.display = 'block';

  // Build preview content
  const item = catalog.items[name];
  if (!item) {
    // Check if it's a PR-only item
    if (toFork && toFork.startsWith('pr-')) {
      const prNum = toFork.slice(3);
      const overlays = catalog.pr_overlays || {};
      for (const spec in overlays) {
        const ov = overlays[spec][prNum];
        if (ov && ov.items_changed && ov.items_changed[name] && ov.items_changed[name].code) {
          const prItem = ov.items_changed[name];
          let prHtml = '<div class="diff-preview-meta">' + (prItem.kind || '') + ' · ' + (prItem.domain || '') + '</div>';
          prHtml += '<pre class="code-block" style="max-height:400px;font-size:11px">' + highlightPython(prItem.code) + '</pre>';
          preview.innerHTML = prHtml;
          return;
        }
      }
    }
    preview.innerHTML = '<div style="padding:8px;color:var(--text-dim);font-size:12px">Type not found in catalog.</div>';
    return;
  }

  let ph = '';

  // Meta line: kind, spec, domain
  const meta = [];
  if (item.kind) meta.push(item.kind);
  if (item.domain) meta.push(item.domain);
  ph += '<div class="diff-preview-meta">' + meta.join(' · ') +
    ' <a href="#/type/' + encodeURIComponent(name) + '" style="color:var(--accent);margin-left:8px;font-size:10px" onclick="event.stopPropagation()">open full →</a></div>';

  // Code for the target fork
  const toCode = getCodeForFork(item, toFork);

  if (fromFork && toCode) {
    // Modified item: show from-code and to-code side by side or stacked
    const fromCode = getCodeForFork(item, fromFork);
    if (fromCode && fromCode !== toCode) {
      ph += renderDiffCodeBlocks(fromCode, toCode, esc(fromFork), esc(toFork));
    } else {
      // Same code or no from-code, just show the target
      ph += '<pre class="code-block" style="max-height:400px;font-size:11px">' + highlightPython(toCode) + '</pre>';
    }
  } else if (toCode) {
    // New item: just show the code
    ph += '<pre class="code-block" style="max-height:400px;font-size:11px">' + highlightPython(toCode) + '</pre>';
  } else {
    ph += '<div style="padding:8px;color:var(--text-dim);font-size:12px">No code definition available.</div>';
  }

  // References
  const latestForks = sortForksRaw(Object.keys(item.forks || {}));
  const latestFork = latestForks[latestForks.length - 1];
  const latestData = (latestFork && item.forks[latestFork]) || {};
  if (latestData.references && latestData.references.length) {
    ph += '<div class="diff-preview-refs">refs: ';
    latestData.references.forEach((ref, i) => {
      ph += typeLink(ref, specName);
      if (i < latestData.references.length - 1) ph += ', ';
    });
    ph += '</div>';
  }

  preview.innerHTML = ph;
}

function diffUpdateFrom(fromVal) {
  // When "From" changes, constrain "To" and navigate
  const specName = parseParams(window.location.hash).spec || Object.keys(catalog.specs)[0];
  const specData = catalog.specs[specName];
  const forkOrder = sortForks((specData && specData.meta && specData.meta.fork_order) || []);
  const fromIdx = forkOrder.indexOf(fromVal);
  const toSel = document.getElementById('diff-to');
  let currentTo = toSel ? toSel.value : '';
  const currentToIdx = forkOrder.indexOf(currentTo);

  // If current "To" is at or before new "From", bump it to the next fork
  if (currentToIdx <= fromIdx) {
    currentTo = forkOrder[fromIdx + 1] || forkOrder[forkOrder.length - 1];
  }
  navigateDiff(null, fromVal, currentTo);
}

function navigateDiff(spec, from, to) {
  const hash = window.location.hash;
  const params = parseParams(hash);
  if (spec !== null) params.spec = spec;
  if (from !== null) params.from = from;
  if (to !== null) params.to = to;
  let qs = Object.entries(params).map(([k,v]) => k + '=' + encodeURIComponent(v)).join('&');
  navigate('#/diff?' + qs);
}

init();

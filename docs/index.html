<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ethspectoor — Ethereum Spec Explorer</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app" id="app">
  <header class="header">
    <div class="logo" onclick="navigate('#/')"><img src="logo.svg" alt="" style="height:20px;vertical-align:middle;margin-right:4px"> The <span class="accent">Ethspectoor</span></div>
    <button class="hamburger" id="hamburger" aria-label="Menu" onclick="document.querySelector('.nav-tabs').classList.toggle('open');this.classList.toggle('open')">☰</button>
    <div class="nav-tabs" id="nav-tabs">
      <button class="nav-tab" data-route="#/" onclick="navigate('#/')">Home</button>
      <button class="nav-tab" data-route="#/types" onclick="navigate('#/types')">Types</button>
      <button class="nav-tab" data-route="#/endpoints" onclick="navigate('#/endpoints')">Endpoints</button>
      <button class="nav-tab" data-route="#/diff" onclick="navigate('#/diff')">Diff</button>
      <button class="nav-tab" data-route="#/prs" onclick="navigate('#/prs')">PRs</button>
      <button class="nav-tab" onclick="window.location='visualizer.html'">Visualizer</button>
    </div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search types, endpoints...  (/ to focus, Esc to clear)" oninput="onSearchInput(this.value)">
    </div>
    <div class="header-stats" id="header-stats"></div>
    <a href="https://github.com/JasonVranek/ethspectoor" target="_blank" rel="noopener" class="github-link" title="View on GitHub">
      <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
  </header>
  <div class="main" id="main-content" style="flex:1;overflow:hidden">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>Loading catalog…</div>
    </div>
  </div>
  <footer class="footer">Built by <a href="https://github.com/JasonVranek" target="_blank" rel="noopener">JasonVranek</a> · <a href="https://github.com/JasonVranek/ethspectoor" target="_blank" rel="noopener">Source on GitHub</a></footer>

  <!-- Skill Modal -->
  <div class="skill-modal-overlay" id="skill-modal" onclick="if(event.target===this)closeSkillModal()">
    <div class="skill-modal">
      <div class="skill-modal-header">
        <span class="skill-modal-title">Ethspectoor MCP Skill</span>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="skill-btn skill-btn-copy" onclick="copySkill(this)" style="font-size:12px;padding:4px 10px">Copy Raw</button>
          <a href="https://github.com/JasonVranek/ethspectoor/blob/main/docs/SKILL.md" target="_blank" rel="noopener" class="skill-btn" style="font-size:12px;padding:4px 10px;text-decoration:none;color:var(--text)">Edit on GitHub</a>
          <button class="skill-modal-close" onclick="closeSkillModal()">&times;</button>
        </div>
      </div>
      <div class="skill-modal-body" id="skill-modal-body">
        <div style="color:var(--text-dim);padding:20px;text-align:center">Loading...</div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
